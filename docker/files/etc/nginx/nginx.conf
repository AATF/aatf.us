#user 1111;
worker_processes auto;

pid /var/run/nginx/nginx.pid;

events {
    worker_connections 1024;
}

http {
    types_hash_max_size 1024;
    types_hash_bucket_size 64;

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    log_format debug_fpm '$remote_addr - $remote_user [$time_local] '
                         '"$request" $status '
                         'script="$document_root$fastcgi_script_name"';

    server {
        listen 8080;
        listen [::]:8080;

        server_name aatf.us;

        return 301 https://www.aatf.us$request_uri;
    }

    server {
        listen 8080;
        listen [::]:8080;

        server_name www.aatf.us;

        error_log /dev/stdout;
        access_log /dev/stdout;
        access_log /dev/stdout debug_fpm;

        error_page 401 403 404 500 502 503 504 /index.php;

        root /website;
        index index.php index.html;

        try_files $uri $uri/ $uri.php$is_args$query_string;
        gzip_static on;

        location / {
            try_files $uri $uri/ $uri.php$is_args$query_string;
        }

        location ~ \.php$ {

            try_files $fastcgi_script_name =404;

            include fastcgi_params;

            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            fastcgi_pass unix:/run/php-fpm/www.sock;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param PATH_INFO $fastcgi_path_info;
            fastcgi_intercept_errors on;

            client_max_body_size 26M;
        }
    }
}
